<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1020"/>
      <stop offset="100%" style="stop-color:#080a12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Diamond / brand mark -->
  <polygon points="256,80 400,256 256,432 112,256"
           fill="none" stroke="url(#accent)" stroke-width="20"
           stroke-linejoin="round" opacity="0.9"/>
  <!-- Inner diamond -->
  <polygon points="256,160 336,256 256,352 176,256"
           fill="url(#accent)" opacity="0.85"/>
  <!-- Subtle horizontal lines (file rename visual) -->
  <line x1="96" y1="380" x2="200" y2="380" stroke="#00d4ff" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <line x1="312" y1="380" x2="416" y2="380" stroke="#7c3aed" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <line x1="232" y1="380" x2="280" y2="380" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
</svg>
